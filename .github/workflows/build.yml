name: Build Phantom NPU APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip phantom_apk.zip

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle 8.6 via sdkman
        run: |
          curl -s "https://get.sdkman.io" | bash
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk install gradle 8.6
          echo "$HOME/.sdkman/candidates/gradle/8.6/bin" >> $GITHUB_PATH

      - name: Build debug APK
        run: |
          cd phantom_apk
          gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: phantom-npu-debug
          path: phantom_apk/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
          
